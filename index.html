<!DOCTYPE html>
<html>

<head>
     <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>KawAnimeList</h1>

    <input type="text" id="search" placeholder="Rechercher un anime...">
<select id="genre-filter">
  <option value="all">Tous les genres</option>

  <!-- Genres principaux -->
  <option value="action">Action</option>
  <option value="aventure">Aventure</option>
  <option value="comédie">Comédie</option>
  <option value="drame">Drame</option>
  <option value="fantasy">Fantasy</option>
  <option value="romance">Romance</option>
  <option value="slice of life">Tranche de vie</option>
  <option value="supernatural">Surnaturel</option>
  <option value="horreur">Horreur</option>
  <option value="mystère">Mystère</option>
  <option value="psychologique">Psychologique</option>
  <option value="thriller">Thriller</option>
  <option value="science-fiction">Science-fiction</option>
  <option value="mecha">Mecha</option>

  <!-- Genres japonais (inchangés) -->
  <option value="shonen">Shonen</option>
  <option value="shojo">Shojo</option>
  <option value="seinen">Seinen</option>
  <option value="josei">Josei</option>
  <option value="isekai">Isekai</option>
  <option value="ecchi">Ecchi</option>
  <option value="harem">Harem</option>
  <option value="reverse harem">Reverse Harem</option>

  <!-- Sous-genres populaires -->
  <option value="sport">Sport</option>
  <option value="musique">Musique</option>
  <option value="militaire">Militaire</option>
  <option value="historique">Historique</option>
  <option value="parodie">Parodie</option>
  <option value="démon">Démon</option>
  <option value="vampire">Vampire</option>
  <option value="magie">Magie</option>
</select>
<div id="anime-container"></div>

    <div class="grid" id="anime-list"></div>

    



    <script src="script.js"></script>
</body>

</html>
